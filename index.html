<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
</head>
<body>
    <h2>Digite o número e confirme</h2>
    <form id="multiplication-form">
        <div class="form-control">
            <label>Tabuado do:</label>
            <input type="number" id="number" placeholder="3" required>
        </div>
        <div class="form-control">
            <label>Multiplicar até:</label>
            <input type="number" id="multiplicator" placeholder="Digite o número de multiplicações" value="10">
        </div>
    </form>
</body>
</html>
